<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sugya</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── Custom Titlebar ─────────────────────────────────────────────────── -->
  <div id="titlebar">
    <div id="titlebar-drag">
      <span id="app-wordmark">
        <img src="icon.png" width="20" height="20" style="object-fit:contain;vertical-align:middle;border-radius:5px"/>
        Sugya
      </span>
    </div>
    <div id="titlebar-controls">
      <button id="btn-minimize" title="Minimize">
        <svg width="10" height="1" viewBox="0 0 10 1"><rect width="10" height="1" fill="currentColor"/></svg>
      </button>
      <button id="btn-maximize" title="Maximize">
        <svg width="10" height="10" viewBox="0 0 10 10"><rect x="0.5" y="0.5" width="9" height="9" rx="1" fill="none" stroke="currentColor"/></svg>
      </button>
      <button id="btn-close" title="Close">
        <svg width="10" height="10" viewBox="0 0 10 10">
          <line x1="0" y1="0" x2="10" y2="10" stroke="currentColor" stroke-width="1.2"/>
          <line x1="10" y1="0" x2="0" y2="10" stroke="currentColor" stroke-width="1.2"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- ── Navigation Bar ────────────────────────────────────────────────────── -->
  <div id="navbar">
    <div id="nav-left">
      <button id="btn-sidebar" class="icon-btn" title="Bookmarks & Progress (B)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/>
        </svg>
      </button>

      <div class="nav-select-group">
        <select id="sel-tractate" title="Select tractate (T)"></select>
        <select id="sel-daf" title="Select daf"></select>
      </div>
    </div>

    <div id="nav-center">
      <button id="btn-prev" class="nav-btn" title="Previous amud (←)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Prev
      </button>

      <div id="daf-label">
        <span id="daf-title">Berachos 2a</span>
        <span id="daf-position">1 of 126</span>
      </div>

      <button id="btn-next" class="nav-btn" title="Next amud (→)">
        Next
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>
    </div>

    <div id="nav-right">
      <button id="btn-today" class="icon-btn gold-btn" title="Jump to today's Daf Yomi">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Today
      </button>

      <button id="btn-bookmark" class="icon-btn" title="Bookmark (Ctrl+D)">
        <svg id="icon-bookmark" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/>
        </svg>
      </button>

      <button id="btn-learned" class="icon-btn" title="Mark learned (L)">
        <svg id="icon-learned" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </button>

      <div class="divider"></div>

      <button id="btn-zoom-out" class="icon-btn" title="Zoom out (-)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
      </button>
      <input id="zoom-level" type="text" value="100%" title="Click to set zoom" readonly>
      <button id="btn-zoom-in" class="icon-btn" title="Zoom in (+)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
      </button>

      <div class="divider"></div>

      <button id="btn-search" class="icon-btn" title="Search Talmud (Ctrl+F)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>

      <button id="btn-notes" class="icon-btn" title="Notes panel (N)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </button>

      <button id="btn-print" class="icon-btn" title="Print current daf (Ctrl+P)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/>
          <rect x="6" y="14" width="12" height="8"/>
        </svg>
      </button>

      <button id="btn-theme" class="icon-btn" title="Toggle theme">
        <svg id="icon-theme" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- ── Main Layout ──────────────────────────────────────────────────────── -->
  <div id="layout">

    <!-- Left Sidebar: Bookmarks + Progress -->
    <aside id="sidebar" class="panel">
      <div class="panel-header">
        <span>Bookmarks</span>
        <button id="btn-clear-bookmarks" class="text-btn" style="font-size:11px">Clear all</button>
      </div>
      <div id="bookmark-list" class="scroll-area"></div>

      <div class="panel-header" style="margin-top:16px">
        <span>Progress</span>
        <span id="overall-progress-label" class="text-muted"></span>
      </div>
      <div id="progress-list" class="scroll-area"></div>
    </aside>

    <!-- Center: PDF Viewer -->
    <main id="viewer-area">
      <div id="viewer-scroll">
        <div id="pages-container"></div>
      </div>

      <!-- Highlight toolbar (appears when highlight mode active) -->
      <div id="highlight-toolbar">
        <button class="hl-color-btn active" data-color="rgba(255,220,0,0.35)" style="--c:#ffd700"></button>
        <button class="hl-color-btn" data-color="rgba(100,200,100,0.35)" style="--c:#64c864"></button>
        <button class="hl-color-btn" data-color="rgba(100,160,255,0.35)" style="--c:#64a0ff"></button>
        <button class="hl-color-btn" data-color="rgba(255,130,130,0.35)" style="--c:#ff8282"></button>
        <div class="hl-divider"></div>
        <button id="btn-hl-erase" class="hl-erase-btn" title="Click a highlight to delete it">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/>
          </svg>
        </button>
        <button id="btn-hl-done" class="hl-done-btn">Done</button>
      </div>

      <!-- Viewer bottom controls -->
      <div id="viewer-footer">
        <button id="btn-highlight-mode" class="footer-btn" title="Highlight mode (H)">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
          Highlight
        </button>
        <button id="btn-translate" class="footer-btn" title="Translation mode (T)">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 5h12M9 3v2m4.5 13l-3-6-3 6m0 0h6M21 21l-6-6m0 0l3-3m-3 3l-3-3"/>
          </svg>
          Translate
        </button>
        <div id="streak-display">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
          <span id="streak-count">0</span> day streak
        </div>
      </div>
    </main>

    <!-- Right Panel: Translation -->
    <aside id="translate-panel" class="panel">
      <div class="panel-header">
        <span>Translation</span>
        <span class="text-muted" style="font-size:10px">William Davidson</span>
      </div>
      <div id="translate-content"></div>
    </aside>

    <!-- Right Panel: Search -->
    <aside id="search-panel" class="panel">
      <div class="panel-header">
        <span>Search</span>
        <div id="search-lang-toggle">
          <button class="search-lang-btn active" data-lang="he">Hebrew</button>
          <button class="search-lang-btn" data-lang="en">English</button>
          <button class="search-lang-btn" data-lang="both">Both</button>
        </div>
      </div>
      <div id="search-input-row">
        <div id="search-input-wrap">
          <input id="search-input" placeholder="Search Talmud…" autocomplete="off" spellcheck="false">
          <button id="search-clear" title="Clear">✕</button>
        </div>
        <button id="search-go">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
      </div>
      <div id="search-status"></div>
      <div id="search-results" class="scroll-area"></div>
    </aside>

    <!-- Right Panel: Notes -->
    <aside id="notes-panel" class="panel">
      <div class="panel-header">
        <span>Notes</span>
        <span id="notes-saved-indicator" class="text-muted" style="font-size:11px;opacity:0"></span>
      </div>
      <textarea id="notes-area" placeholder="Your thoughts on this daf…&#10;&#10;Auto-saved as you type."></textarea>
      <div id="notes-footer">
        <span id="notes-charcount" class="text-muted" style="font-size:11px">0 chars</span>
        <span id="notes-timestamp" class="text-muted" style="font-size:11px"></span>
      </div>
    </aside>

  </div>

  <!-- ── Print Preview Modal ───────────────────────────────────────────── -->
  <div id="print-preview-modal">
    <div id="print-preview-dialog">
      <div id="print-preview-header">
        <div id="print-range">
          <label>From</label>
          <select id="print-from"></select>
          <label>To</label>
          <select id="print-to"></select>
          <span id="print-page-count" class="text-muted"></span>
        </div>
        <div id="print-preview-actions">
          <button id="btn-print-confirm">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/>
              <rect x="6" y="14" width="12" height="8"/>
            </svg>
            Print
          </button>
          <button id="btn-print-cancel">Cancel</button>
        </div>
      </div>
      <div id="print-preview-body"></div>
    </div>
  </div>

  <!-- ── Status Bar ──────────────────────────────────────────────────────── -->
  <div id="statusbar">
    <span id="sb-daf-yomi"></span>
    <span style="flex:1"></span>
    <span id="sb-shortcuts" class="text-muted" style="font-size:11px">← → navigate &nbsp;·&nbsp; B bookmark &nbsp;·&nbsp; L learned &nbsp;·&nbsp; H highlight &nbsp;·&nbsp; N notes &nbsp;·&nbsp; Ctrl+F search</span>
  </div>

  <script type="module" src="renderer.js"></script>
</body>
</html>
